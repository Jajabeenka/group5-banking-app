<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Banking - Sign In</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 500px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-logo {
            font-size: 36px;
            font-weight: 800;
            color: #1e3a8a;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            background: #f9fafb;
            outline: none;
        }

        .input-group input:focus {
            border-color: #1e3a8a;
        }

        /* Red error message alert */
        .error-box {
            display: none;
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-logo">apex.</div>

        <!-- Error alert message container -->
        <div id="errorBox" class="error-box">Invalid username or password.</div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Username</label>
                <input id="usernameInput" type="text" required placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input id="passwordInput" type="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submitBtn">Sign In</button>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault(); // Prevent standard page submit

            const usernameInput = document.getElementById('usernameInput').value;
            const passwordInput = document.getElementById('passwordInput').value;
            const errorBox = document.getElementById('errorBox');
            const submitBtn = document.getElementById('submitBtn');

            // Hide previous errors
            errorBox.style.display = 'none';
            submitBtn.innerText = 'Signing in...';

            // Extract 'amt' from URL
            const urlParams = new URLSearchParams(window.location.search);
            const amount = urlParams.get('amt') || '0.00';

            try {
                // Send credentials to Flask /login endpoint
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    // Successful login: Redirect to index passing user info and real DB balance
                    const user = encodeURIComponent(data.user.username);
                    const balance = encodeURIComponent(data.user.balance);
                    window.location.href = `index?user=${user}&amt=${amount}`;
                } else {
                    // Show error message on failed login
                    errorBox.innerText = data.message || 'Invalid username or password';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = 'Server error. Please check backend connection.';
                errorBox.style.display = 'block';
            } finally {
                submitBtn.innerText = 'Sign In';
            }
        }
    </script>
</body>
</html>
