<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Waxo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 600px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 20px;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        /* --- PAYMENT SCREEN --- */
        .payment-page {
            justify-content: space-between;
        }

        .header {
            margin-top: 10px;
            text-align: center;
        }

        .payment-label {
            font-size: 16px;
            color: #6b7280;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .amount-display {
            font-size: 48px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 8px;
        }

        .payment-details {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label { color: #6b7280; }
        .detail-value { color: #1f2937; font-weight: 600; }

        .pay-btn-container {
            margin-bottom: 10px;
        }

        /* --- MAIN DASHBOARD --- */
        .dashboard-page {
            justify-content: flex-start;
            padding-top: 60px;
        }

        .user-greeting {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 24px;
        }

        .balance-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            padding: 30px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.15);
        }

        .balance-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .balance-value {
            font-size: 42px;
            font-weight: 700;
        }

        /* --- LOADING & SUCCESS SCREEN --- */
        .status-page {
            justify-content: center;
            align-items: center;
            background: #ffffff;
            z-index: 30;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #1e3a8a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .status-text {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- SCREEN 1: PAYMENT OVERVIEW -->
        <div id="paymentPage" class="page payment-page">
            <div class="header">
                <div class="payment-label">Amount Due</div>
                <div class="amount-display" id="amountDisplay">₱0.00</div>

                <div class="payment-details">
                    <div class="detail-row">
                        <span class="detail-label">Merchant</span>
                        <span class="detail-value">Banco de Waxo Services Inc.</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Invoice Reference</span>
                        <span class="detail-value">#INV-2026-8942</span>
                    </div>
                </div>
            </div>

            <div class="pay-btn-container">
                <button class="btn" onclick="startPayment()">Pay</button>
            </div>
        </div>

        <!-- SCREEN 2: PROCESSING LAYOVER -->
        <div id="statusPage" class="page status-page hidden">
            <div id="loadingState">
                <div class="spinner"></div>
            </div>

            <div id="paidState" class="hidden" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
                <div class="success-icon">✓</div>
                <div class="status-text">Paid</div>
                <button class="btn" onclick="goToDashboard()" style="margin-top: 35px; padding: 12px 30px; font-size: 15px; width: auto;">Return Home</button>
            </div>
        </div>

        <!-- SCREEN 3: END ACCOUNTS PANEL -->
        <div id="dashboardPage" class="page dashboard-page hidden">
            <div class="user-greeting">Hello, <span id="displayName">User</span></div>
            <div class="balance-card">
                <div class="balance-title">Remaining Balance</div>
                <div class="balance-value" id="remainingBalanceDisplay">₱0.00</div>
            </div>
        </div>

    </div>

    <script>
        // 1. Get amount due from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const rawAmountDue = parseFloat(urlParams.get('amt')) || 0;

        // 2. Read secure user & balance injected directly by Flask Jinja template
        const enteredName = "{{ username }}";
        const initialBankBalance = parseFloat("{{ balance }}") || 0;

        // Set initial amount display dynamically on boot
        document.getElementById('amountDisplay').innerText = "₱" + rawAmountDue.toFixed(2);

        function startPayment() {
            // Show processing layout
            document.getElementById('paymentPage').classList.add('hidden');
            document.getElementById('statusPage').classList.remove('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('paidState').classList.add('hidden');

            // Send request to Flask to evaluate and update MySQL database
            fetch('/trigger-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: enteredName,
                    amt: rawAmountDue
                })
            })
            .then(response => {
                // Check if backend returned a successful status code (200 OK)
                if (!response.ok) {
                    return response.json().then(errData => { throw new Error(errData.error || "Payment Failed"); });
                }
                return response.json();
            })
            .then(data => {
                console.log("Payment response:", data);
                if (data.status === 'success') {
                    // Instantly redirect to success page on validation pass
                    window.location.href = "/success";
                } else {
                    window.location.href = `/error?reason=${encodeURIComponent(data.error || 'Unknown error')}`;
                }
            })
            .catch(err => {
                console.error("Payment failed:", err);
                // Redirect to error page on network error or validation failure (like insufficient funds)
                window.location.href = `/error?reason=${encodeURIComponent(err.message)}`;
            });
        }
    
        function goToDashboard() {
            // Use updated balance from MySQL response if available
            const finalBalance = (serverUpdatedBalance !== null) ? serverUpdatedBalance : Math.max(0, initialBankBalance - rawAmountDue);
    
            document.getElementById('remainingBalanceDisplay').innerText = "₱" + finalBalance.toLocaleString('en-US', {
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2
            });
    
            document.getElementById('displayName').innerText = enteredName;
            document.getElementById('statusPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
        }
    </script>
 
</body>
</html>
