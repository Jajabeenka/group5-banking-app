<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; padding: 40px; background: #ffffff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .error-icon { width: 80px; height: 80px; background: #ef4444; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 38px; font-weight: bold; margin: 0 auto 24px auto; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }
        .status-text { font-size: 24px; font-weight: 700; color: #1f2937; margin-bottom: 12px; }
        .reason-text { font-size: 16px; color: #dc2626; font-weight: 500; background: #fee2e2; padding: 12px; border-radius: 8px; margin-bottom: 30px; }
        .btn { width: 100%; padding: 18px; background: #1e3a8a; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; text-decoration: none; display: block; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="error-icon">✕</div>
        <div class="status-text">Transaction Declined</div>
        <!-- Dynamic reason sent via Flask context -->
        <div class="reason-text">{{ reason }}</div>
        <a href="/index" class="btn">Return Home</a>
    </div>
</body>
</html>
