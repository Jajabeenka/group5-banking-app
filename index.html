<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Banking</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Full screen web container */
        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 600px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 20px;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .hidden {
            display: none !important;
        }

        /* --- SIGN IN PAGE --- */
        .login-page {
            justify-content: center;
        }

        .brand-logo {
            font-size: 36px;
            font-weight: 800;
            color: #1e3a8a;
            margin-bottom: 40px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            background: #f9fafb;
            outline: none;
        }

        .input-group input:focus {
            border-color: #1e3a8a;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        /* --- PAYMENT SCREEN --- */
        .payment-page {
            justify-content: space-between;
        }

        .header {
            margin-top: 10px;
            text-align: center;
        }

        .payment-label {
            font-size: 16px;
            color: #6b7280;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .amount-display {
            font-size: 48px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 8px;
        }

        .payment-details {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label { color: #6b7280; }
        .detail-value { color: #1f2937; font-weight: 600; }

        .pay-btn-container {
            margin-bottom: 10px;
        }

        /* --- MAIN DASHBOARD --- */
        .dashboard-page {
            justify-content: flex-start;
            padding-top: 60px;
        }

        .user-greeting {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 24px;
        }

        .balance-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            padding: 30px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.15);
        }

        .balance-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .balance-value {
            font-size: 42px;
            font-weight: 700;
        }

        /* --- LOADING & SUCCESS SCREEN --- */
        .status-page {
            justify-content: center;
            align-items: center;
            background: #ffffff;
            z-index: 10;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #1e3a8a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .status-text {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- SCREEN 1: SIGN IN -->
        <div id="loginPage" class="page login-page">
            <div class="brand-logo">apex.</div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Username</label>
                    <input id="usernameInput" type="text" required placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
        </div>

        <!-- SCREEN 2: PAYMENT OVERVIEW -->
        <div id="paymentPage" class="page payment-page hidden">
            <div class="header">
                <div class="payment-label">Amount Due</div>
                <div class="amount-display">₱3,450.00</div>
                
                <div class="payment-details">
                    <div class="detail-row">
                        <span class="detail-label">Merchant</span>
                        <span class="detail-value">Apex Services Inc.</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Invoice Reference</span>
                        <span class="detail-value">#INV-2026-8942</span>
                    </div>
                </div>
            </div>
            
            <div class="pay-btn-container">
                <button class="btn" onclick="startPayment()">Pay</button>
            </div>
        </div>

        <!-- SCREEN 3: INTERMEDIARY STATUSES (LOADING & PAID) -->
        <div id="statusPage" class="page status-page hidden">
            <!-- 2-Second Loading Element -->
            <div id="loadingState">
                <div class="spinner"></div>
            </div>
            
            <!-- Success Element -->
            <div id="paidState" class="hidden" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
                <div class="success-icon">✓</div>
                <div class="status-text">Paid</div>
                <button class="btn" onclick="goToDashboard()" style="margin-top: 35px; padding: 12px 30px; font-size: 15px; width: auto;">Return Home</button>
            </div>
        </div>

        <!-- SCREEN 4: POST-PAYMENT DASHBOARD -->
        <div id="dashboardPage" class="page dashboard-page hidden">
            <!-- Dynamically populated name -->
            <div class="user-greeting">Hello, <span id="displayName">User</span></div>
            <div class="balance-card">
                <div class="balance-title">Remaining Balance</div>
                <div class="balance-value">₱41,800.00</div>
            </div>
        </div>

    </div>

    <script>
        let enteredName = "User";

        // Save username input and progress to payment screen
        function handleLogin(event) {
            event.preventDefault(); 
            const inputVal = document.getElementById('usernameInput').value;
            if (inputVal.trim() !== "") {
                enteredName = inputVal;
            }
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('paymentPage').classList.remove('hidden');
        }

        // Handles the payment flow with the 2-second timeout
        function startPayment() {
            document.getElementById('paymentPage').classList.add('hidden');
            document.getElementById('statusPage').classList.remove('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('paidState').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('paidState').classList.remove('hidden');
            }, 2000); 
        }

        // Closes status and opens dashboard showing ONLY user name and remaining balance
        function goToDashboard() {
            document.getElementById('displayName').innerText = enteredName;
            document.getElementById('statusPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
        }
    </script>
</body>
</html>
