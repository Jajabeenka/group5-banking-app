<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Banking - Sign In</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 500px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-logo {
            font-size: 36px;
            font-weight: 800;
            color: #1e3a8a;
            margin-bottom: 40px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            background: #f9fafb;
            outline: none;
        }

        .input-group input:focus {
            border-color: #1e3a8a;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-logo">apex.</div>
        <form id="loginForm" onsubmit="handleRedirectLogin(event)">
            <div class="input-group">
                <label>Username</label>
                <input id="usernameInput" type="text" required placeholder="Enter any username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>

    <script>
        function handleRedirectLogin(event) {
        	event.preventDefault(); // Stops the page from refreshing normally
        
        	// 1. Grab the username the user just typed into the input field
        	const username = encodeURIComponent(document.getElementById('usernameInput').value || 'User');
        
        	// 2. Grab the amount that Flask originally embedded in the page
        	const urlParams = new URLSearchParams(window.location.search);
        	const amount = encodeURIComponent(urlParams.get('amt') || '0.00');

        	// 3. Send both pieces of data directly to index.html via the browser URL
        	window.location.href = `index?user=${username}&amt=${amount}`;
    	}
    </script>
</body>
</html>
